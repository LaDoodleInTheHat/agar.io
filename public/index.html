<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agar.io Multiplayer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; font-family:'Rajdhani',sans-serif; overflow:hidden; color:#fff; }
  canvas { display:block; }
  #score-display {
    position:fixed; top:18px; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',monospace; font-size:14px; letter-spacing:3px;
    color:rgba(255,255,255,0.85); text-shadow:0 0 12px rgba(100,200,255,0.6);
    background:rgba(0,0,0,0.4); padding:6px 20px; border-radius:20px;
    border:1px solid rgba(255,255,255,0.1); pointer-events:none;
  }
  #leaderboard {
    position:fixed; top:18px; right:18px;
    background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.1);
    border-radius:12px; padding:12px 16px; min-width:160px;
    backdrop-filter:blur(6px); pointer-events:none;
  }
  #leaderboard h3 { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.5); margin-bottom:10px; }
  #leaderboard-list { list-style:none; }
  #leaderboard-list li { font-size:13px; padding:3px 0; color:rgba(255,255,255,0.8); display:flex; justify-content:space-between; gap:12px; border-bottom:1px solid rgba(255,255,255,0.05); }
  #leaderboard-list li.you { color:#7df; font-weight:600; }
  #leaderboard-list li span { color:rgba(255,255,255,0.4); font-size:11px; }
  #ping-display { position:fixed; bottom:18px; right:18px; font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.3); pointer-events:none; }
  #hint { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); font-size:12px; letter-spacing:2px; color:rgba(255,255,255,0.25); pointer-events:none; }
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.78); backdrop-filter:blur(4px); z-index:10;
  }
  #overlay h1 {
    font-family:'Orbitron',monospace; font-size:clamp(28px,5vw,52px); font-weight:700; letter-spacing:6px;
    background:linear-gradient(135deg,#7df 30%,#f7d 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px;
  }
  #overlay .subtitle { color:rgba(255,255,255,0.45); font-size:14px; letter-spacing:2px; margin-bottom:30px; }
  #overlay input {
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:8px;
    color:#fff; font-family:'Rajdhani',sans-serif; font-size:16px; padding:10px 18px;
    text-align:center; outline:none; margin-bottom:16px; width:220px;
  }
  #overlay input:focus { border-color:rgba(100,200,255,0.5); }
  #overlay button {
    background:linear-gradient(135deg,#3af 0%,#84f 100%); border:none; border-radius:8px;
    color:#fff; cursor:pointer; font-family:'Orbitron',monospace; font-size:13px;
    letter-spacing:3px; padding:12px 32px; transition:opacity .2s, transform .15s;
  }
  #overlay button:hover { opacity:.85; transform:scale(1.04); }
  #overlay .note { font-size:12px; color:rgba(255,255,255,0.25); margin-top:18px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="score-display">MASS: <span id="mass-val">—</span></div>
<div id="leaderboard"><h3>LEADERBOARD</h3><ul id="leaderboard-list"></ul></div>
<div id="hint">MOVE: arrow keys &nbsp;|&nbsp; SPLIT: space &nbsp;|&nbsp; EJECT: W</div>
<div id="ping-display">PING: —ms</div>
<div id="overlay">
  <h1>AGAR.IO</h1>
  <p class="subtitle">EAT OR BE EATEN</p>
  <input id="name-input" type="text" maxlength="16" placeholder="Enter your name" autofocus />
  <button id="play-btn">PLAY</button>
  <p class="note">Multiplayer — share your IP to play with friends</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

const socket = io();

// ─── Game state ───────────────────────────────────────────────────────────────
let myId = null, myName = '', playing = false;

// Snapshot buffer: array of { time, snap }
// We always render at (now - RENDER_DELAY), interpolating between the two
// snapshots that bracket that moment.
const TICK_MS = 1000 / 30;     // server sends at 30hz
const RENDER_DELAY = TICK_MS * 2.5; // stay 2.5 ticks behind — always have room to interpolate
const buf = [];

// Smooth camera
const cam = { x: 1500, y: 1500, scale: 0.8 };

// Arrow keys
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (!playing) return;
  if (e.code === 'Space') socket.emit('split');
  if (e.key === 'w' || e.key === 'W') socket.emit('eject');
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Compute world-space movement target from arrow keys
// Returns a point far in the desired direction from the player center
function arrowTarget(playerCx, playerCy) {
  let dx = 0, dy = 0;
  if (keys['ArrowRight']) dx += 1;
  if (keys['ArrowLeft'])  dx -= 1;
  if (keys['ArrowDown'])  dy += 1;
  if (keys['ArrowUp'])    dy -= 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  return { tx: playerCx + dx * 3000, ty: playerCy + dy * 3000 };
}

// ─── Socket events ────────────────────────────────────────────────────────────
socket.on('joined', ({ id }) => { myId = id; });

socket.on('state', snap => {
  buf.push({ time: Date.now(), snap });
  // Keep only last 10 snapshots
  if (buf.length > 10) buf.shift();
});

socket.on('dead', ({ killer }) => {
  playing = false;
  const last = buf.length ? buf[buf.length-1].snap.players.find(p => p.isYou) : null;
  const mass = last ? Math.floor(last.cells.reduce((s,c) => s+c.mass, 0)) : 0;
  showDeathScreen(killer, mass);
});

// ─── Send input every frame ───────────────────────────────────────────────────
// Use the last known player position so direction is stable
let lastPlayerCx = 1500, lastPlayerCy = 1500;

function sendInput() {
  if (!playing) return;
  const { tx, ty } = arrowTarget(lastPlayerCx, lastPlayerCy);
  socket.emit('input', { tx, ty });
}

// ─── Ping ─────────────────────────────────────────────────────────────────────
let pingStart = 0;
setInterval(() => { pingStart = Date.now(); socket.emit('ping_'); }, 2000);
socket.on('pong_', () => {
  document.getElementById('ping-display').textContent = `PING: ${Date.now() - pingStart}ms`;
});

// ─── Interpolation ────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

// Find the interpolated frame for render time `rt`
function getFrame(rt) {
  if (!buf.length) return null;

  // Find the two buffer entries that bracket rt
  let before = null, after = null;
  for (let i = 0; i < buf.length; i++) {
    if (buf[i].time <= rt) before = buf[i];
    else { after = buf[i]; break; }
  }

  // If no bracket found, clamp to what we have
  if (!before) return buf[0].snap;
  if (!after)  return buf[buf.length - 1].snap;

  // Interpolation factor 0→1 between before and after
  const range = after.time - before.time;
  const t = range > 0 ? (rt - before.time) / range : 1;

  const a = before.snap, b = after.snap;

  // Build cell lookup maps for fast matching
  const playerMapA = new Map();
  for (const p of a.players) {
    const cells = new Map();
    for (const c of p.cells) cells.set(c.id, c);
    playerMapA.set(p.id, cells);
  }

  const players = b.players.map(pb => {
    const cellsA = playerMapA.get(pb.id);
    const cells = pb.cells.map(cb => {
      const ca = cellsA?.get(cb.id);
      if (!ca) return cb; // new cell — just show at target position
      return {
        ...cb,
        x: lerp(ca.x, cb.x, t),
        y: lerp(ca.y, cb.y, t),
        r: lerp(ca.r, cb.r, t),
      };
    });
    return { ...pb, cells };
  });

  return { ...b, players };
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function adjustColor(col, amt) {
  if (!col.startsWith('#')) return col;
  let s = col.slice(1);
  if (s.length === 3) s = s.split('').map(c => c+c).join('');
  const r = Math.min(255, Math.max(0, parseInt(s.slice(0,2),16)+amt));
  const g = Math.min(255, Math.max(0, parseInt(s.slice(2,4),16)+amt));
  const b = Math.min(255, Math.max(0, parseInt(s.slice(4,6),16)+amt));
  return `rgb(${r},${g},${b})`;
}

function drawCell(c, color, name, isYou) {
  const sx = (c.x - cam.x)*cam.scale + canvas.width/2;
  const sy = (c.y - cam.y)*cam.scale + canvas.height/2;
  const sr = c.r * cam.scale;
  if (sx+sr < 0 || sx-sr > canvas.width || sy+sr < 0 || sy-sr > canvas.height) return;
  const grad = ctx.createRadialGradient(sx-sr*0.3, sy-sr*0.3, sr*0.05, sx, sy, sr);
  grad.addColorStop(0, adjustColor(color, 50));
  grad.addColorStop(0.6, color);
  grad.addColorStop(1, adjustColor(color, -30));
  ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = isYou ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.25)';
  ctx.lineWidth = isYou ? Math.max(2, sr*0.05) : Math.max(1, sr*0.04);
  ctx.stroke();
  if (sr > 14) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `bold ${Math.min(sr*0.45,20)}px Rajdhani,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(name, sx, sy);
  }
}

function drawGrid() {
  const gs = 40 * cam.scale;
  const ox = (-cam.x*cam.scale + canvas.width/2) % gs;
  const oy = (-cam.y*cam.scale + canvas.height/2) % gs;
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = ox; x < canvas.width; x += gs) { ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); }
  for (let y = oy; y < canvas.height; y += gs) { ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); }
  ctx.stroke();
}

function drawBorder() {
  ctx.strokeStyle = 'rgba(100,200,255,0.25)'; ctx.lineWidth = 2;
  ctx.strokeRect(
    (0 - cam.x)*cam.scale + canvas.width/2,
    (0 - cam.y)*cam.scale + canvas.height/2,
    3000*cam.scale, 3000*cam.scale
  );
}

function drawVirus(v) {
  const sx = (v.x-cam.x)*cam.scale + canvas.width/2;
  const sy = (v.y-cam.y)*cam.scale + canvas.height/2;
  const sr = v.r * cam.scale;
  if (sx+sr<0||sx-sr>canvas.width||sy+sr<0||sy-sr>canvas.height) return;
  ctx.beginPath();
  for (let i = 0; i < 32; i++) {
    const ang = (i/32)*Math.PI*2;
    const r = i%2===0 ? sr : sr*0.75;
    i===0 ? ctx.moveTo(sx+Math.cos(ang)*r, sy+Math.sin(ang)*r)
           : ctx.lineTo(sx+Math.cos(ang)*r, sy+Math.sin(ang)*r);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(50,200,100,0.4)'; ctx.fill();
  ctx.strokeStyle = 'rgba(50,255,100,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
}

// ─── Render loop (60fps) ──────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  sendInput();

  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!playing) return;

  // Render at a fixed delay behind "now" so we always have two snapshots
  const renderTime = Date.now() - RENDER_DELAY;
  const frame = getFrame(renderTime);
  if (!frame) return;

  const me = frame.players.find(p => p.isYou);
  if (!me || !me.cells.length) return;

  // Update stable player position for input direction
  lastPlayerCx = me.cells.reduce((s,c) => s+c.x, 0) / me.cells.length;
  lastPlayerCy = me.cells.reduce((s,c) => s+c.y, 0) / me.cells.length;

  // Smooth camera — zoom based on both mass AND spread of split cells
  const myMass = me.cells.reduce((s,c) => s+c.mass, 0);
  const scaleByMass = 64 / (Math.sqrt(myMass)*4 + 10);
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const c of me.cells) {
    minX = Math.min(minX, c.x - c.r); maxX = Math.max(maxX, c.x + c.r);
    minY = Math.min(minY, c.y - c.r); maxY = Math.max(maxY, c.y + c.r);
  }
  const scaleBySpread = Math.min(
    (canvas.width  * 0.7) / Math.max(maxX - minX, 1),
    (canvas.height * 0.7) / Math.max(maxY - minY, 1)
  );
  const targetScale = Math.min(1.2, Math.max(0.15, Math.min(scaleByMass, scaleBySpread)));
  cam.x = lerp(cam.x, lastPlayerCx, 0.1);
  cam.y = lerp(cam.y, lastPlayerCy, 0.1);
  cam.scale = lerp(cam.scale, targetScale, 0.05);

  drawGrid();
  drawBorder();

  // Food
  for (const f of frame.food) {
    const sx = (f.x-cam.x)*cam.scale + canvas.width/2;
    const sy = (f.y-cam.y)*cam.scale + canvas.height/2;
    const sr = Math.max(1.5, f.r*cam.scale);
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle = f.color; ctx.fill();
  }

  // Viruses
  for (const v of frame.viruses) drawVirus(v);

  // Players (others behind, self on top)
  const sorted = [...frame.players].sort((a,b) => a.isYou - b.isYou);
  for (const p of sorted)
    for (const c of p.cells) drawCell(c, p.color, p.name, p.isYou);

  // HUD
  document.getElementById('mass-val').textContent = Math.floor(myMass);
  document.getElementById('leaderboard-list').innerHTML = frame.leaderboard
    .map((e,i) => `<li class="${e.isYou?'you':''}"><span>#${i+1}</span>${e.name}<span>${e.mass}</span></li>`)
    .join('');
}
requestAnimationFrame(loop);

// ─── UI ───────────────────────────────────────────────────────────────────────
function startGame() {
  myName = document.getElementById('name-input').value.trim() || 'Player';
  socket.emit('join', { name: myName });
  playing = true;
  document.getElementById('overlay').style.display = 'none';
}

function showDeathScreen(killer, mass) {
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>GAME OVER</h1>
    <p style="color:rgba(255,120,120,0.85);font-size:14px;letter-spacing:2px;margin-bottom:6px">Eaten by <strong>${killer}</strong></p>
    <p style="font-size:13px;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-bottom:24px">FINAL MASS: ${mass}</p>
    <input id="name-input" type="text" maxlength="16" placeholder="Your name" value="${myName}" />
    <button id="play-btn">PLAY AGAIN</button>
  `;
  ov.style.display = 'flex';
  document.getElementById('play-btn').onclick = respawn;
  document.getElementById('name-input').onkeydown = e => { if (e.key==='Enter') respawn(); };
}

function respawn() {
  myName = document.getElementById('name-input').value.trim() || myName;
  socket.emit('respawn', { name: myName });
  playing = true;
  document.getElementById('overlay').style.display = 'none';
}

document.getElementById('play-btn').addEventListener('click', startGame);
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key==='Enter') startGame(); });
</script>
</body>
</html>
